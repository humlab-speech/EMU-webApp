<div class="grazer-modal-wrap" ng-controller="ExportCtrl">
    <div class="grazer-modal-header-large grazer-modal-header">
        <h3 id="modalHeading">
            Download {{dataIn}}
        </h3>
	</div>
	<div class="grazer-modal-body">
	    <div class="grazer-text">
			<div>
				Do you wish to download "{{dataIn}}" ?
			</div>
      <pre class="grazer-exportdata">{{modal.dataExport}}</pre>
	    </div>

	</div>
	<div class="grazer-modal-footer">
	  <button ng-click="modal.close();" id="modalCancelBtn" class="grazer-mini-btn">Cancel</button>
	  <button ng-click="export();" class="grazer-mini-btn">Download</button>
	</div>
</div>
