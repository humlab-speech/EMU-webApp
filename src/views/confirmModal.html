<div class="grazer-modal-wrap" ng-controller="ModalCtrl">
	<div class="grazer-modal-header-large grazer-modal-header">
	  <h3 id="modalHeading">
		Confirm
	  </h3>
	</div>
	<div class="grazer-modal-body" ng-controller="ModalCtrl">
	    <div class="grazer-text">
	        <div>{{dataIn}}</div>
	    </div>
	</div>
	<div class="grazer-modal-footer">
		<button id="grazer-modal-cancel" ng-click="modal.close();" class="grazer-mini-btn">Cancel</button>
		<button id="grazer-modal-confirm" ng-click="modal.confirm();" class="grazer-mini-btn">Confirm</button>
	</div>
</div>
